name: Reporte disponibilidad flota

on:
  workflow_dispatch:

  schedule:
    - cron: "30 7 * * 1-6"
      timezone: "America/Santiago"

jobs:
  generar-y-enviar:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar librerías
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas matplotlib openpyxl

      - name: Generar y enviar reporte
        env:
          DRIVIN_API_KEY: ${{ secrets.DRIVIN_API_KEY }}
          CORREO_ORIGEN: ${{ secrets.CORREO_ORIGEN }}
          CORREO_DESTINO: ${{ secrets.CORREO_DESTINO }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python Programa_disponibilidad.py
